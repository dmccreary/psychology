<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Standard Deviation Visualization</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            padding: 8px 14px 8px;
        }
        #chart-wrapper {
            width: 100%;
            height: 395px;
        }
        #controls {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 10px 2px 4px;
        }
        #regenBtn {
            padding: 9px 18px;
            background: #1a6ab8;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #regenBtn:hover { background: #145392; }
        #regenBtn:active { background: #0f3e6e; }
        #slider-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #sd-display {
            font-size: 13px;
            font-weight: bold;
            color: #1a6ab8;
            text-align: center;
        }
        #sdSlider {
            width: 100%;
            cursor: pointer;
            accent-color: #1a6ab8;
        }
        #slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
        }
        #sim-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 4px 0 2px;
        }
        #sim-subtitle {
            text-align: center;
            font-size: 13px;
            color: #444;
            padding: 0 0 6px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <main>
        <div id="sim-title">Standard Deviation Visualization</div>
        <div id="sim-subtitle">Distribution of Experimental Readings</div>
        <div id="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
        <div id="controls">
            <button id="regenBtn">Regenerate Data</button>
            <div id="slider-group">
                <div id="sd-display">Standard Deviation (σ): <span id="sd-val">8.0</span></div>
                <input type="range" id="sdSlider" min="0" max="25" value="8" step="0.5">
                <div id="slider-labels">
                    <span>Low Standard Deviation</span>
                    <span>High Standard Deviation</span>
                </div>
            </div>
        </div>
    </main>
    <script src="standard-deviation.js"></script>

    <br/>
    <a href=".">Return to Lesson Plan</a>
</body>
</html>
