# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'Psychology'
site_description: 'A comprehensive intelligent textbook exploring human thought, emotion, development, and behavior through interactive simulations and guided learning.'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/psychology/'

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/psychology'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Navigation
# IMPORTANT: do NOT add `navigation.tabs` — these books use side navigation
# optimized for wide landscape screens.
nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
      - List of Chapters: chapters/index.md
      - 1. Foundations & Research Methods: chapters/01-foundations-research-methods/index.md
      - 2. Biological Bases of Behavior: chapters/02-biological-bases-behavior/index.md
      - 3. Neurochemistry & Psychopharmacology: chapters/03-neurochemistry-psychopharmacology/index.md
      - 4. Sensation and Perception: chapters/04-sensation-perception/index.md
      - 5. Cognition and Thinking: chapters/05-cognition-thinking/index.md
      - 6. Memory - Encoding & Storage: chapters/06-memory-encoding-storage/index.md
      - 7. Memory - Retrieval & Forgetting: chapters/07-memory-retrieval-forgetting/index.md
      - 8. Development - Prenatal to Childhood: chapters/08-development-prenatal-childhood/index.md
      - 9. Development - Adolescence to Adulthood: chapters/09-development-adolescence-adulthood/index.md
      - 10. Learning and Conditioning: chapters/10-learning-conditioning/index.md
      - 11. Social Psych - Attitudes & Influence: chapters/11-social-psychology-attitudes-influence/index.md
      - 12. Social Psych - Groups & Prejudice: chapters/12-social-psychology-groups-prejudice/index.md
      - 13. Personality and Motivation: chapters/13-personality-motivation/index.md
      - 14. Health Psych & Intro to Disorders: chapters/14-health-psychology-intro-disorders/index.md
      - 15. Psychological Disorders: chapters/15-psychological-disorders/index.md
      - 16. Treatment and Therapy: chapters/16-treatment-therapy/index.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      - Concept List (College Board): learning-graph/concept-list-from-college-board.md
      - Concept Enumeration: learning-graph/concept-list.md
      - Graph Quality Analysis: learning-graph/quality-metrics.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Taxonomy Distribution Report: learning-graph/taxonomy-distribution.md
      - Mascot Style Guide: learning-graph/mascot-test.md

  - MicroSims:
      - List of MicroSims: sims/index.md
      - Learning Graph Viewer: sims/graph-viewer/index.md

  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'green'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - css/mascot.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/character-sheet.md
  **/cover-prompt.md
  **/TODO.md
  **/index-template.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'Psychology'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
